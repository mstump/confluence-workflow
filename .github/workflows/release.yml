name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: confluence-workflow-linux-x86_64
            use_zigbuild: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: confluence-workflow-linux-aarch64
            use_zigbuild: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: confluence-workflow-macos-x86_64
            use_zigbuild: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: confluence-workflow-macos-aarch64
            use_zigbuild: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig and cargo-zigbuild (Linux)
        if: matrix.use_zigbuild
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild (Linux)
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: '!matrix.use_zigbuild'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          BIN=target/${{ matrix.target }}/release/confluence-workflow
          cp "$BIN" ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz
